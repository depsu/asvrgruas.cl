name: Publicar en Cloudflare
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy (si hay token)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: a757b3f38f203502871fa7053adfc05c
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Sin CLOUDFLARE_API_TOKEN: se omite el auto-deploy. Agrega el secreto para activarlo."
            exit 0
          fi
          npx --yes wrangler deploy
