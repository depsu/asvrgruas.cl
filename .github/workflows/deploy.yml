name: Publicar en Cloudflare
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy (Workers Static Assets)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: a757b3f38f203502871fa7053adfc05c
        run: npx --yes wrangler deploy --assets=./ --name asvrgruas --compatibility-date 2026-06-28 --compatibility-flags=nodejs_compat
